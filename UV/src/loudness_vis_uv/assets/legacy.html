<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LoudnessVis — Audio Visualization Workstation</title>
<style>
@font-face {
  font-family: 'MiSans';
  font-weight: 400;
  font-style: normal;
  src: url('./dist/fonts/MiSans-Regular.woff2') format('woff2');
  font-display: swap;
}
@font-face {
  font-family: 'MiSans';
  font-weight: 500;
  font-style: normal;
  src: url('./dist/fonts/MiSans-Medium.woff2') format('woff2');
  font-display: swap;
}

* { box-sizing: border-box; }
html, body { height: 100%; }

/* ============ 主题变量 ============ */
:root {
  /* 浅色（默认） */
  --bg-grad:
    radial-gradient(circle at 12% -5%, rgba(170, 200, 240, 0.55), transparent 45%),
    radial-gradient(circle at 90% 8%,  rgba(220, 195, 235, 0.42), transparent 50%),
    radial-gradient(circle at 55% 105%, rgba(180, 220, 215, 0.40), transparent 55%),
    linear-gradient(135deg, #ebeef3 0%, #d8dde4 100%);
  --bar-bg:        rgba(255, 255, 255, 0.45);
  --bar-bg-thin:   rgba(255, 255, 255, 0.40);
  --panel-bg:      rgba(255, 255, 255, 0.55);
  --panel-border:  rgba(255, 255, 255, 0.7);
  --panel-shadow:  0 1px 4px rgba(20, 30, 50, 0.04);
  --bar-bottom:    rgba(255, 255, 255, 0.6);
  --divider:       rgba(20, 30, 50, 0.06);
  --btn-bg:        rgba(255, 255, 255, 0.7);
  --btn-bg-hover:  rgba(255, 255, 255, 0.92);
  --btn-bg-active: rgba(235, 238, 244, 0.9);
  --btn-border:    rgba(20, 30, 50, 0.08);
  --text:          #1d2026;
  --text-2:        #5a6273;
  --text-3:        #8b94a3;
  --grid:          rgba(35, 50, 90, 0.07);
  --grid-strong:   rgba(35, 50, 90, 0.10);
  --tooltip-bg:    rgba(255, 255, 255, 0.95);
  --tooltip-border:rgba(20, 30, 50, 0.18);
  --tooltip-shadow:0 4px 12px rgba(20, 30, 50, 0.15);
  --wave-unplayed: #bcc1cb;
  --hover-cross:   rgba(232, 93, 74, 0.55);
  --canvas-base:   rgba(255, 255, 255, 0.6);
  --canvas-trail:  rgba(255, 255, 255, 0.16);
}
body.dark {
  --bg-grad:
    radial-gradient(circle at 10% -5%, rgba(60, 90, 150, 0.30), transparent 45%),
    radial-gradient(circle at 92% 10%, rgba(120, 70, 130, 0.22), transparent 50%),
    radial-gradient(circle at 55% 105%, rgba(40, 110, 100, 0.20), transparent 55%),
    linear-gradient(135deg, #181c24 0%, #0d1117 100%);
  --bar-bg:        rgba(20, 25, 35, 0.55);
  --bar-bg-thin:   rgba(20, 25, 35, 0.40);
  --panel-bg:      rgba(28, 33, 43, 0.55);
  --panel-border:  rgba(255, 255, 255, 0.07);
  --panel-shadow:  0 1px 4px rgba(0, 0, 0, 0.25);
  --bar-bottom:    rgba(255, 255, 255, 0.07);
  --divider:       rgba(255, 255, 255, 0.06);
  --btn-bg:        rgba(255, 255, 255, 0.06);
  --btn-bg-hover:  rgba(255, 255, 255, 0.12);
  --btn-bg-active: rgba(255, 255, 255, 0.04);
  --btn-border:    rgba(255, 255, 255, 0.10);
  --text:          #e8e8e8;
  --text-2:        #a3a8b3;
  --text-3:        #6b7280;
  --grid:          rgba(150, 170, 220, 0.08);
  --grid-strong:   rgba(150, 170, 220, 0.14);
  --tooltip-bg:    rgba(28, 33, 43, 0.95);
  --tooltip-border:rgba(255, 255, 255, 0.12);
  --tooltip-shadow:0 4px 12px rgba(0, 0, 0, 0.5);
  --wave-unplayed: #4a4f5a;
  --hover-cross:   rgba(232, 130, 110, 0.65);
  --canvas-base:   rgba(28, 33, 43, 0.6);
  --canvas-trail:  rgba(15, 18, 25, 0.20);
}

body {
  margin: 0;
  color: var(--text);
  font: 16px/1.5 'MiSans', 'Mi Sans', 'PingFang SC', 'Microsoft YaHei UI', 'Microsoft YaHei', 'Segoe UI', sans-serif;
  overflow: hidden;
  background: var(--bg-grad);
  transition: background 0.3s, color 0.3s;
}

/* ============ 工具栏 ============ */
.toolbar {
  height: 60px;
  padding: 0 22px;
  background: var(--bar-bg);
  backdrop-filter: blur(24px) saturate(1.5);
  -webkit-backdrop-filter: blur(24px) saturate(1.5);
  border-bottom: 1px solid var(--bar-bottom);
  box-shadow: 0 1px 0 var(--divider);
  display: flex; gap: 14px; align-items: center;
}
.toolbar .btn {
  padding: 8px 18px;
  background: var(--btn-bg);
  border: 1px solid var(--btn-border);
  color: var(--text);
  cursor: pointer;
  border-radius: 6px;
  font: inherit;
  user-select: none;
  transition: background 0.15s, border-color 0.15s;
}
.toolbar .btn:hover {
  background: var(--btn-bg-hover);
}
.toolbar .btn:active { background: var(--btn-bg-active); }
.toolbar .btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.toolbar .file-name {
  color: var(--text-2);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-left: 8px;
}
.toolbar .label-text { color: var(--text-2); }
.toolbar input[type=range] {
  width: 140px;
  vertical-align: middle;
  accent-color: #3b6db5;
}

/* ============ 指标横条 ============ */
.stats-bar {
  height: 110px;
  background: var(--bar-bg-thin);
  backdrop-filter: blur(24px) saturate(1.5);
  -webkit-backdrop-filter: blur(24px) saturate(1.5);
  border-bottom: 1px solid var(--bar-bottom);
  display: grid;
  grid-template-columns: repeat(8, 1fr);
}
.stat {
  position: relative;
  padding: 12px 18px 12px 24px;
  border-right: 1px solid var(--divider);
  display: flex; flex-direction: column;
  justify-content: center;
  min-width: 0;
}
.stat:last-child { border-right: none; }
.stat::before {
  content: '';
  position: absolute;
  left: 12px;
  top: 16px;
  bottom: 16px;
  width: 3px;
  border-radius: 2px;
  background: var(--accent, #888);
  box-shadow: 0 0 10px var(--accent-glow, rgba(0,0,0,0.1));
}
.stat .head {
  display: flex;
  align-items: baseline;
  gap: 8px;
  white-space: nowrap;
  overflow: hidden;
  margin-bottom: 4px;
}
.stat .cn {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}
.stat .en {
  font-size: 11px;
  color: var(--accent, #888);
  letter-spacing: 0.6px;
  text-transform: uppercase;
  overflow: hidden;
  text-overflow: ellipsis;
  font-weight: 500;
}
.stat .value {
  font-size: 24px;
  font-weight: 500;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.15;
}
.stat .value.warn { color: #e85d4a; }
.stat .value.ok   { color: #1f9e6a; }
.stat .range {
  font-size: 11px;
  color: var(--text-3);
  font-variant-numeric: tabular-nums;
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ============ 主区域 ============ */
.layout {
  display: grid;
  grid-template-columns: 360px minmax(0, 1fr);
  grid-template-rows: 360px minmax(180px, 1fr);
  gap: 10px;
  padding: 10px;
  height: calc(100vh - 60px - 110px);
}
.panel {
  background: var(--panel-bg);
  backdrop-filter: blur(24px) saturate(1.5);
  -webkit-backdrop-filter: blur(24px) saturate(1.5);
  border: 1px solid var(--panel-border);
  border-radius: 10px;
  padding: 12px 16px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--panel-shadow);
  min-height: 0;
  min-width: 0;
  transition: background 0.3s, border-color 0.3s;
}
.panel h3 {
  margin: 0 0 8px;
  font-size: 14px;
  color: var(--text);
  letter-spacing: 0.3px;
  font-weight: 500;
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.panel h3 .triangle {
  color: #3b6db5;
  font-size: 10px;
}
.panel h3 .en {
  font-size: 11px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  font-weight: 400;
}
.panel canvas {
  display: block;
  width: 100%;
  height: calc(100% - 30px);
}
#spectrum canvas { cursor: crosshair; }
#waveform canvas { cursor: grab; }
#waveform canvas:active { cursor: grabbing; }
#goniometer { grid-column: 1; grid-row: 1; }
#spectrum   { grid-column: 2; grid-row: 1; }
#waveform   { grid-column: 1 / 3; grid-row: 2; }

/* ============ 拖入遮罩 ============ */
.dropzone-overlay {
  position: fixed; inset: 0;
  background: var(--panel-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: none; align-items: center; justify-content: center;
  font-size: 28px;
  font-weight: 500;
  color: #3b6db5;
  pointer-events: none;
  z-index: 1000;
  outline: 3px dashed #3b6db5;
  outline-offset: -16px;
}
.dropzone-overlay.show { display: flex; }
</style>
</head>
<body>

<div class="toolbar">
  <label class="btn">
    选择文件
    <input type="file" id="fileInput" accept="audio/*" hidden>
  </label>
  <button class="btn" id="playBtn" disabled>▶ 播放</button>
  <span class="file-name" id="fileName">未加载（也可直接把音频文件拖到窗口）</span>
  <button class="btn" id="themeBtn">深色</button>
  <span class="label-text">音量</span>
  <input type="range" id="vol" min="0" max="1" step="0.01" value="0.6">
</div>

<div class="stats-bar" id="statsGrid"></div>

<div class="layout">
  <div id="goniometer" class="panel">
    <h3><span class="triangle">▶</span> 声场指示器 <span class="en">Goniometer · Mid / Side</span></h3>
    <canvas></canvas>
  </div>
  <div id="spectrum" class="panel">
    <h3><span class="triangle">▶</span> 实时频响曲线 <span class="en">Spectrum · FFT (log freq, dBFS)</span></h3>
    <canvas></canvas>
  </div>
  <div id="waveform" class="panel">
    <h3><span class="triangle">▶</span> 波形 · 实时滚动 <span class="en">Waveform · click to seek</span></h3>
    <canvas></canvas>
  </div>
</div>

<div class="dropzone-overlay" id="dropOverlay">↓ 松开以加载音频文件</div>

<script>
"use strict";

/* =========================================================
 * 主题切换
 * ========================================================= */
const themeBtn = document.getElementById('themeBtn');
function applyTheme(name) {
  if (name === 'dark') {
    document.body.classList.add('dark');
    themeBtn.textContent = '深色';
  } else {
    document.body.classList.remove('dark');
    themeBtn.textContent = '浅色';
  }
  try { localStorage.setItem('lvTheme', name); } catch (_) {}
  // 切主题时清空声场画布的拖尾残留（首次调用时 canvas 还在 TDZ，所以 try/catch）
  try {
    goniCtx.clearRect(0, 0, goniCanvas.clientWidth, goniCanvas.clientHeight);
  } catch (_) {}
}
themeBtn.onclick = () => applyTheme(document.body.classList.contains('dark') ? 'light' : 'dark');

/* 读取 CSS 变量（绘制 canvas 时用） */
function cssVar(name) {
  return getComputedStyle(document.body).getPropertyValue(name).trim();
}

/* =========================================================
 * Web Audio 信号链
 * ========================================================= */
const ctx = new (window.AudioContext || window.webkitAudioContext)();

const splitter = ctx.createChannelSplitter(2);
const lAna     = ctx.createAnalyser();
const rAna     = ctx.createAnalyser();
const specAna  = ctx.createAnalyser();
const gainNode = ctx.createGain();

lAna.fftSize    = 2048;
rAna.fftSize    = 2048;
specAna.fftSize = 4096;
specAna.smoothingTimeConstant = 0.7;
gainNode.gain.value = 0.6;

splitter.connect(lAna,    0);
splitter.connect(rAna,    1);
splitter.connect(specAna, 0);
gainNode.connect(ctx.destination);

const lBuf    = new Float32Array(lAna.fftSize);
const rBuf    = new Float32Array(rAna.fftSize);
const specBuf = new Float32Array(specAna.frequencyBinCount);

/* =========================================================
 * 状态
 * ========================================================= */
let audioBuffer    = null;
let source         = null;
let isPlaying      = false;
let pauseOffset    = 0;
let startTime      = 0;
let waveformPeaks  = null;
const PEAKS_N      = 2000;

const rmsHistory   = [];
const RMS_HIST_MAX = 1800;

/* 频响 hover 坐标（屏幕像素，相对 canvas） */
let specHoverX = -1, specHoverY = -1;

/* 波形拖拽状态 */
let isDragging = false;
let wasPlayingBeforeDrag = false;

/* =========================================================
 * 文件加载
 * ========================================================= */
async function loadFile(file) {
  document.getElementById('fileName').textContent = file.name;
  const arr = await file.arrayBuffer();
  if (ctx.state === 'suspended') await ctx.resume();
  try {
    audioBuffer = await ctx.decodeAudioData(arr);
  } catch (e) {
    document.getElementById('fileName').textContent = '解码失败：' + (e.message || e);
    return;
  }
  pauseOffset = 0;
  rmsHistory.length = 0;
  for (const k in statHistory) statHistory[k].length = 0;
  waveformPeaks = precomputeWaveform(audioBuffer, PEAKS_N);
  if (isPlaying) pausePlayback();
  startPlayback();
}

function precomputeWaveform(buf, N) {
  const samplesPerSlot = buf.length / N;
  const min = new Float32Array(N);
  const max = new Float32Array(N);
  const ch0 = buf.getChannelData(0);
  const ch1 = buf.numberOfChannels > 1 ? buf.getChannelData(1) : ch0;
  for (let i = 0; i < N; i++) {
    const s = Math.floor(i * samplesPerSlot);
    const e = Math.min(buf.length, Math.floor((i + 1) * samplesPerSlot));
    let mn = 0, mx = 0;
    for (let j = s; j < e; j++) {
      const v = (ch0[j] + ch1[j]) * 0.5;
      if (v < mn) mn = v;
      if (v > mx) mx = v;
    }
    min[i] = mn; max[i] = mx;
  }
  return { min, max };
}

document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

const dropOverlay = document.getElementById('dropOverlay');
let dragDepth = 0;
window.addEventListener('dragenter', e => {
  e.preventDefault();
  dragDepth++;
  dropOverlay.classList.add('show');
});
window.addEventListener('dragleave', () => {
  dragDepth--;
  if (dragDepth <= 0) { dragDepth = 0; dropOverlay.classList.remove('show'); }
});
window.addEventListener('dragover', e => e.preventDefault());
window.addEventListener('drop', e => {
  e.preventDefault();
  dragDepth = 0;
  dropOverlay.classList.remove('show');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

/* =========================================================
 * 播放控制（toggle）
 * ========================================================= */
function startPlayback() {
  if (!audioBuffer) return;
  if (source) {
    source.onended = null;
    try { source.stop(); } catch (_) {}
    source.disconnect();
    source = null;
  }
  source = ctx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(splitter);
  source.connect(gainNode);
  source.start(0, pauseOffset);
  startTime = ctx.currentTime - pauseOffset;
  isPlaying = true;
  source.onended = () => {
    // 仅在自然结束时进入这里（手动停止前会先把 onended 置 null）
    isPlaying = false;
    pauseOffset = 0;
    updatePlayBtn();
  };
  updatePlayBtn();
}

function pausePlayback() {
  if (!isPlaying) return;
  pauseOffset = ctx.currentTime - startTime;
  if (audioBuffer && pauseOffset >= audioBuffer.duration) pauseOffset = 0;
  if (source) {
    source.onended = null;
    try { source.stop(); } catch (_) {}
    source.disconnect();
    source = null;
  }
  isPlaying = false;
  updatePlayBtn();
}

function togglePlay() {
  if (!audioBuffer) return;
  if (ctx.state === 'suspended') ctx.resume();
  if (isPlaying) pausePlayback();
  else startPlayback();
}

function updatePlayBtn() {
  const btn = document.getElementById('playBtn');
  if (!audioBuffer) {
    btn.textContent = '▶ 播放';
    btn.disabled = true;
  } else if (isPlaying) {
    btn.textContent = '⏸ 暂停';
    btn.disabled = false;
  } else {
    btn.textContent = pauseOffset > 0 ? '▶ 继续' : '▶ 播放';
    btn.disabled = false;
  }
}

document.getElementById('playBtn').onclick = togglePlay;
document.getElementById('vol').oninput = e => {
  gainNode.gain.value = parseFloat(e.target.value);
};

/* 空格键也作为 toggle */
window.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
    e.preventDefault();
    togglePlay();
  }
});

/* =========================================================
 * Canvas 适配
 * ========================================================= */
const goniCanvas = document.querySelector('#goniometer canvas');
const specCanvas = document.querySelector('#spectrum canvas');
const waveCanvas = document.querySelector('#waveform canvas');
const goniCtx = goniCanvas.getContext('2d');
const specCtx = specCanvas.getContext('2d');
const waveCtx = waveCanvas.getContext('2d');

function fitCanvas(c) {
  const r = c.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  c.width  = Math.max(2, Math.round(r.width  * dpr));
  c.height = Math.max(2, Math.round(r.height * dpr));
  c.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
}
function fitAll() {
  fitCanvas(goniCanvas);
  fitCanvas(specCanvas);
  fitCanvas(waveCanvas);
  // canvas 默认透明，避免主题切换时底色残留
}
fitAll();
window.addEventListener('resize', fitAll);

/* =========================================================
 * 频响 hover
 * ========================================================= */
specCanvas.addEventListener('mousemove', e => {
  const rect = specCanvas.getBoundingClientRect();
  specHoverX = e.clientX - rect.left;
  specHoverY = e.clientY - rect.top;
});
specCanvas.addEventListener('mouseleave', () => {
  specHoverX = specHoverY = -1;
});

/* =========================================================
 * 波形拖拽跳转（mousedown → 暂停并定位 / mousemove → 跟随 / mouseup → 恢复）
 * ========================================================= */
function waveformXToTime(clientX) {
  const rect = waveCanvas.getBoundingClientRect();
  const x = Math.max(0, Math.min(rect.width, clientX - rect.left));
  return x / rect.width * audioBuffer.duration;
}

waveCanvas.addEventListener('mousedown', e => {
  if (!audioBuffer || e.button !== 0) return;
  isDragging = true;
  wasPlayingBeforeDrag = isPlaying;
  if (isPlaying) pausePlayback();
  pauseOffset = Math.max(0, Math.min(audioBuffer.duration - 0.05, waveformXToTime(e.clientX)));
  updatePlayBtn();
});

window.addEventListener('mousemove', e => {
  if (!isDragging || !audioBuffer) return;
  pauseOffset = Math.max(0, Math.min(audioBuffer.duration - 0.05, waveformXToTime(e.clientX)));
});

window.addEventListener('mouseup', () => {
  if (!isDragging) return;
  isDragging = false;
  if (wasPlayingBeforeDrag) {
    if (ctx.state === 'suspended') ctx.resume();
    startPlayback();   // 从拖动结束位置继续播放
  } else {
    updatePlayBtn();
  }
});

/* =========================================================
 * 指标计算
 * ========================================================= */
function computeStats(L, R) {
  const N = L.length;
  let peak = 0;
  let sumL = 0, sumR = 0;
  let sumLL = 0, sumRR = 0, sumLR = 0;
  let sumMid2 = 0, sumSide2 = 0;
  let clipCount = 0;
  const SQRT_HALF = 0.7071067811865475;

  for (let i = 0; i < N; i++) {
    const l = L[i], r = R[i];
    const al = Math.abs(l), ar = Math.abs(r);
    if (al > peak) peak = al;
    if (ar > peak) peak = ar;
    if (al > 0.95) clipCount++;
    if (ar > 0.95) clipCount++;
    sumL += l;  sumR += r;
    sumLL += l * l;  sumRR += r * r;  sumLR += l * r;
    const m = (l + r) * SQRT_HALF;
    const s = (l - r) * SQRT_HALF;
    sumMid2  += m * m;
    sumSide2 += s * s;
  }

  const rmsL   = Math.sqrt(sumLL / N);
  const rmsR   = Math.sqrt(sumRR / N);
  const rms    = (rmsL + rmsR) / 2;
  const peakDb = 20 * Math.log10(peak + 1e-9);
  const rmsDb  = 20 * Math.log10(rms  + 1e-9);
  const crest  = peakDb - rmsDb;

  const denom = Math.sqrt((N * sumLL - sumL * sumL) * (N * sumRR - sumR * sumR));
  const corr  = denom > 1e-12 ? (N * sumLR - sumL * sumR) / denom : 0;
  const width = Math.sqrt(sumSide2) / (Math.sqrt(sumMid2) + 1e-12);

  const meanL = sumL / N;
  let m2 = 0, m4 = 0;
  for (let i = 0; i < N; i++) {
    const d  = L[i] - meanL;
    const d2 = d * d;
    m2 += d2;
    m4 += d2 * d2;
  }
  m2 /= N;  m4 /= N;
  const kurtL = m2 > 1e-12 ? m4 / (m2 * m2) - 3 : 0;

  return { peakDb, rmsDb, crest, clip95: clipCount / (2 * N), corr, width, kurtL };
}

function percentile(arr, p) {
  const sorted = [...arr].sort((a, b) => a - b);
  return sorted[Math.min(Math.floor(sorted.length * p), sorted.length - 1)];
}

function median(arr) {
  if (!arr.length) return NaN;
  const s = [...arr].sort((a, b) => a - b);
  const n = s.length;
  return n % 2 ? s[(n - 1) >> 1] : (s[n/2 - 1] + s[n/2]) / 2;
}

function formatTime(s) {
  if (!isFinite(s) || s < 0) return '0:00';
  const m  = Math.floor(s / 60);
  const ss = Math.floor(s % 60).toString().padStart(2, '0');
  return m + ':' + ss;
}

/* =========================================================
 * 绘制：声场指示器
 * ========================================================= */
function drawGoniometer(L, R) {
  const w = goniCanvas.clientWidth;
  const h = goniCanvas.clientHeight;

  goniCtx.fillStyle = cssVar('--canvas-trail') || 'rgba(255,255,255,0.16)';
  goniCtx.fillRect(0, 0, w, h);

  goniCtx.strokeStyle = cssVar('--grid-strong') || 'rgba(35,50,90,0.10)';
  goniCtx.lineWidth = 1;
  goniCtx.beginPath();
  goniCtx.moveTo(w / 2, 0);  goniCtx.lineTo(w / 2, h);
  goniCtx.moveTo(0, h / 2);  goniCtx.lineTo(w, h / 2);
  goniCtx.moveTo(0, 0);      goniCtx.lineTo(w, h);
  goniCtx.moveTo(w, 0);      goniCtx.lineTo(0, h);
  goniCtx.stroke();
  const cx = w / 2, cy = h / 2;
  const radius = Math.min(w, h) * 0.42;
  goniCtx.beginPath();
  goniCtx.arc(cx, cy, radius, 0, Math.PI * 2);
  goniCtx.stroke();

  const SQRT_HALF = 0.7071067811865475;
  goniCtx.fillStyle = 'rgba(59, 109, 181, 0.55)';
  for (let i = 0; i < L.length; i++) {
    const side = (L[i] - R[i]) * SQRT_HALF;
    const mid  = (L[i] + R[i]) * SQRT_HALF;
    const x = cx + side * radius;
    const y = cy - mid  * radius;
    goniCtx.fillRect(x, y, 1.5, 1.5);
  }

  goniCtx.fillStyle = cssVar('--text-2') || '#5a6273';
  goniCtx.font = '14px MiSans, "Microsoft YaHei", sans-serif';
  goniCtx.fillText('L',    10,        20);
  goniCtx.fillText('R',    w - 22,    20);
  goniCtx.fillText('Mid',  cx + 8,    18);
  goniCtx.fillText('Side', w - 50,    cy - 6);
}

/* =========================================================
 * 绘制：频响曲线（含 hover）
 * ========================================================= */
function drawSpectrum(specDb) {
  const w = specCanvas.clientWidth;
  const h = specCanvas.clientHeight;
  specCtx.clearRect(0, 0, w, h);

  const fs   = ctx.sampleRate;
  const fMin = 20;
  const fMax = fs / 2;
  const fToX = f => Math.log2(f / fMin) / Math.log2(fMax / fMin) * w;
  const xToF = x => fMin * Math.pow(fMax / fMin, x / w);

  const textColor = cssVar('--text-2') || '#5a6273';
  const gridColor = cssVar('--grid') || 'rgba(35,50,90,0.07)';

  specCtx.strokeStyle = gridColor;
  specCtx.fillStyle   = textColor;
  specCtx.font        = '13px MiSans, "Microsoft YaHei", sans-serif';
  for (let db = 0; db >= -100; db -= 20) {
    const y = h * (-db / 100);
    specCtx.beginPath();
    specCtx.moveTo(0, y); specCtx.lineTo(w, y);
    specCtx.stroke();
    specCtx.fillText(db + ' dB', 8, y + 16);
  }
  [50, 100, 500, 1000, 5000, 10000, 20000].forEach(f => {
    if (f >= fMax) return;
    const x = fToX(f);
    specCtx.beginPath();
    specCtx.moveTo(x, 0); specCtx.lineTo(x, h);
    specCtx.stroke();
    specCtx.fillText(f >= 1000 ? f / 1000 + 'k' : f, x + 5, h - 7);
  });

  // 蓝色填充 + 描边
  specCtx.fillStyle = 'rgba(75, 130, 200, 0.30)';
  specCtx.beginPath();
  specCtx.moveTo(0, h);
  let started = false;
  const N = specDb.length;
  for (let i = 1; i < N; i++) {
    const f = i * fs / (2 * N);
    if (f < fMin) continue;
    if (f > fMax) break;
    const x = fToX(f);
    const v = Math.max(-100, Math.min(0, specDb[i]));
    const y = h * (-v / 100);
    if (!started) { specCtx.lineTo(x, h); started = true; }
    specCtx.lineTo(x, y);
  }
  specCtx.lineTo(w, h);
  specCtx.closePath();
  specCtx.fill();

  specCtx.strokeStyle = '#3b6db5';
  specCtx.lineWidth   = 1.5;
  specCtx.beginPath();
  started = false;
  for (let i = 1; i < N; i++) {
    const f = i * fs / (2 * N);
    if (f < fMin) continue;
    if (f > fMax) break;
    const x = fToX(f);
    const v = Math.max(-100, Math.min(0, specDb[i]));
    const y = h * (-v / 100);
    if (!started) { specCtx.moveTo(x, y); started = true; }
    else specCtx.lineTo(x, y);
  }
  specCtx.stroke();

  // ===== Hover：十字线 + 浮窗 =====
  if (specHoverX >= 0 && specHoverX <= w && specHoverY >= 0 && specHoverY <= h) {
    const f = xToF(specHoverX);
    const db = -100 * (specHoverY / h);

    // 十字线
    specCtx.strokeStyle = cssVar('--hover-cross') || 'rgba(232,93,74,0.55)';
    specCtx.lineWidth = 1;
    specCtx.beginPath();
    specCtx.moveTo(specHoverX, 0); specCtx.lineTo(specHoverX, h);
    specCtx.moveTo(0, specHoverY); specCtx.lineTo(w, specHoverY);
    specCtx.stroke();

    // 文本
    const fStr  = f >= 1000 ? (f / 1000).toFixed(2) + ' kHz' : f.toFixed(0) + ' Hz';
    const dbStr = db.toFixed(1) + ' dBFS';
    specCtx.font = '13px MiSans, "Microsoft YaHei", sans-serif';
    const text = fStr + '   ' + dbStr;
    const tw = specCtx.measureText(text).width;
    const padX = 10, padY = 6;
    const boxW = tw + padX * 2;
    const boxH = 24;
    let bx = specHoverX + 10;
    let by = specHoverY - boxH - 8;
    if (bx + boxW > w - 4) bx = specHoverX - boxW - 10;
    if (by < 4) by = specHoverY + 12;

    specCtx.fillStyle = cssVar('--tooltip-bg') || 'rgba(255,255,255,0.95)';
    specCtx.strokeStyle = cssVar('--tooltip-border') || 'rgba(20,30,50,0.18)';
    specCtx.lineWidth = 1;
    specCtx.fillRect(bx, by, boxW, boxH);
    specCtx.strokeRect(bx, by, boxW, boxH);
    specCtx.fillStyle = cssVar('--text') || '#1d2026';
    specCtx.fillText(text, bx + padX, by + 16);
  }
}

/* =========================================================
 * 绘制：波形
 * ========================================================= */
function drawWaveform() {
  const w = waveCanvas.clientWidth;
  const h = waveCanvas.clientHeight;
  waveCtx.clearRect(0, 0, w, h);

  if (!waveformPeaks) {
    waveCtx.fillStyle = cssVar('--text-3') || '#9aa3b3';
    waveCtx.font = '14px MiSans, "Microsoft YaHei", sans-serif';
    waveCtx.fillText('载入音频后显示整首歌的波形', 12, h / 2);
    return;
  }

  let progress = 0;
  if (audioBuffer) {
    if (isPlaying) {
      progress = (ctx.currentTime - startTime) / audioBuffer.duration;
    } else if (pauseOffset > 0) {
      progress = pauseOffset / audioBuffer.duration;
    }
    progress = Math.max(0, Math.min(1, progress));
  }

  const N    = waveformPeaks.min.length;
  const cy   = h * 0.50;
  const half = h * 0.40;
  const playX = progress * w;

  const playedColor   = '#3b6db5';
  const unplayedColor = cssVar('--wave-unplayed') || '#bcc1cb';
  for (let px = 0; px < w; px++) {
    const i = Math.min(N - 1, Math.floor(px / w * N));
    const mn = waveformPeaks.min[i];
    const mx = waveformPeaks.max[i];
    const y1 = cy - mx * half;
    const y2 = cy - mn * half;
    waveCtx.strokeStyle = px <= playX ? playedColor : unplayedColor;
    waveCtx.beginPath();
    waveCtx.moveTo(px + 0.5, y1);
    waveCtx.lineTo(px + 0.5, y2);
    waveCtx.stroke();
  }

  if (audioBuffer) {
    // 拖动中：先画一层光晕，再画主线
    if (isDragging) {
      waveCtx.strokeStyle = 'rgba(232, 93, 74, 0.30)';
      waveCtx.lineWidth = 10;
      waveCtx.beginPath();
      waveCtx.moveTo(playX, 0); waveCtx.lineTo(playX, h);
      waveCtx.stroke();
      waveCtx.strokeStyle = 'rgba(232, 93, 74, 0.55)';
      waveCtx.lineWidth = 5;
      waveCtx.beginPath();
      waveCtx.moveTo(playX, 0); waveCtx.lineTo(playX, h);
      waveCtx.stroke();
    }
    // 主播放头线
    waveCtx.strokeStyle = '#e85d4a';
    waveCtx.lineWidth = isDragging ? 2.5 : 2;
    waveCtx.beginPath();
    waveCtx.moveTo(playX, 0);
    waveCtx.lineTo(playX, h);
    waveCtx.stroke();
    // 顶部三角
    const tri = isDragging ? 7 : 5;
    waveCtx.fillStyle = '#e85d4a';
    waveCtx.beginPath();
    waveCtx.moveTo(playX - tri, 0);
    waveCtx.lineTo(playX + tri, 0);
    waveCtx.lineTo(playX,       tri + 2);
    waveCtx.closePath();
    waveCtx.fill();
    // 拖动中：中线放大圆点手柄
    if (isDragging) {
      waveCtx.fillStyle = 'rgba(232, 93, 74, 0.22)';
      waveCtx.beginPath();
      waveCtx.arc(playX, cy, 16, 0, Math.PI * 2);
      waveCtx.fill();
      waveCtx.fillStyle = '#e85d4a';
      waveCtx.beginPath();
      waveCtx.arc(playX, cy, 6, 0, Math.PI * 2);
      waveCtx.fill();
    }
    waveCtx.lineWidth = 1;

    const cur = audioBuffer.duration * progress;
    const dur = audioBuffer.duration;
    waveCtx.fillStyle = cssVar('--text') || '#3a4150';
    waveCtx.font = '14px MiSans, "Microsoft YaHei", sans-serif';
    waveCtx.fillText(formatTime(cur), 8, h - 8);
    const durStr = formatTime(dur);
    const durW   = waveCtx.measureText(durStr).width;
    waveCtx.fillText(durStr, w - 8 - durW, h - 8);
  }
}

/* =========================================================
 * 指标定义 + 区间历史
 * ========================================================= */
const statDefs = [
  { key:'peakDb', cn:'峰值',     en:'Peak',           color:'#e85d4a',
    fmt: v => v.toFixed(2) + ' dBFS', dec: 1,
    warn: v => v > -0.3, ok: v => v < -1 },
  { key:'rmsDb',  cn:'均方根',    en:'RMS',            color:'#e8a64a',
    fmt: v => v.toFixed(2) + ' dB',   dec: 1,
    warn: v => v > -8,   ok: v => v < -14 },
  { key:'crest',  cn:'峰值因子',  en:'Crest Factor',   color:'#3b6db5',
    fmt: v => v.toFixed(2) + ' dB',   dec: 1,
    warn: v => v < 8,    ok: v => v > 12 },
  { key:'dr90',   cn:'动态范围',  en:'DR90 ~30s',      color:'#4ac3e8',
    fmt: v => v.toFixed(2) + ' dB',   dec: 1,
    warn: v => v < 6,    ok: v => v > 10 },
  { key:'clip95', cn:'削波率',    en:'Clip95%',        color:'#d04ae8',
    fmt: v => (v * 100).toFixed(2) + ' %', dec: 1,
    fmtRange: v => (v * 100).toFixed(1),
    warn: v => v > 0.05, ok: v => v < 0.005 },
  { key:'corr',   cn:'声道相关',  en:'LR Correlation', color:'#4ad8a8',
    fmt: v => v.toFixed(3),           dec: 2,
    warn: v => v < 0,    ok: v => v > 0.2 && v < 0.85 },
  { key:'width',  cn:'声场宽度',  en:'Stereo Width',   color:'#8da3e8',
    fmt: v => v.toFixed(3),           dec: 2,
    warn: null,          ok: null },
  { key:'kurtL',  cn:'L 峰度',    en:'L Kurtosis',     color:'#e84a8d',
    fmt: v => v.toFixed(3),           dec: 2,
    warn: v => v < -0.3, ok: v => v > 0 },
];

const STAT_WINDOW = 30;     // 0.5 秒滑动窗
const statHistory = {};
statDefs.forEach(d => statHistory[d.key] = []);

function pushStatHistory(stats) {
  for (const d of statDefs) {
    const v = stats[d.key];
    if (v == null || isNaN(v)) continue;
    const arr = statHistory[d.key];
    arr.push(v);
    if (arr.length > STAT_WINDOW) arr.shift();
  }
}

const statsGridEl = document.getElementById('statsGrid');
statDefs.forEach(d => {
  const el = document.createElement('div');
  el.className = 'stat';
  el.dataset.key = d.key;
  el.style.setProperty('--accent',      d.color);
  el.style.setProperty('--accent-glow', d.color + '40');
  el.innerHTML =
    '<div class="head">' +
      '<span class="cn">' + d.cn + '</span>' +
      '<span class="en">' + d.en + '</span>' +
    '</div>' +
    '<div class="value" id="stat-' + d.key + '">—</div>' +
    '<div class="range" id="range-' + d.key + '">—</div>';
  statsGridEl.appendChild(el);
});

function drawStats() {
  for (const d of statDefs) {
    const arr = statHistory[d.key];
    const elV = document.getElementById('stat-' + d.key);
    const elR = document.getElementById('range-' + d.key);
    if (!arr || arr.length === 0) {
      elV.textContent = '—'; elV.className = 'value';
      elR.textContent = '—';
      continue;
    }
    // 主数值：中位数（稳定）
    const med = median(arr);
    elV.textContent = d.fmt(med);
    elV.classList.remove('warn', 'ok');
    if      (d.warn && d.warn(med)) elV.classList.add('warn');
    else if (d.ok   && d.ok(med))   elV.classList.add('ok');
    // 区间：min — max
    let mn = Infinity, mx = -Infinity;
    for (const v of arr) { if (v < mn) mn = v; if (v > mx) mx = v; }
    const fmtR = d.fmtRange || (v => v.toFixed(d.dec));
    elR.textContent = fmtR(mn) + ' — ' + fmtR(mx);
  }
}

/* =========================================================
 * 主循环
 * ========================================================= */
function tick() {
  if (audioBuffer && isPlaying) {
    lAna.getFloatTimeDomainData(lBuf);
    rAna.getFloatTimeDomainData(rBuf);
    specAna.getFloatFrequencyData(specBuf);

    const stats = computeStats(lBuf, rBuf);
    rmsHistory.push(stats.rmsDb);
    if (rmsHistory.length > RMS_HIST_MAX) rmsHistory.shift();
    stats.dr90 = rmsHistory.length >= 60
      ? percentile(rmsHistory, 0.9) - percentile(rmsHistory, 0.1)
      : NaN;

    pushStatHistory(stats);

    drawGoniometer(lBuf, rBuf);
    drawSpectrum(specBuf);
    drawWaveform();
    drawStats();
  } else {
    drawWaveform();
    // hover 状态下也持续重绘频响（即便没声音）
    if (specHoverX >= 0) drawSpectrum(specBuf);
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
updatePlayBtn();
// 初始化主题（放在最底部，避免 TDZ）
applyTheme((() => { try { return localStorage.getItem('lvTheme') || 'light'; } catch(_) { return 'light'; } })());
</script>
