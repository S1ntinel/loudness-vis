<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>响度战争可视化器 — Loudness War Visualizer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const normalizedPath = decodeURIComponent(location.pathname).replace(/\\/g, '/');
      const isFileEntry = location.protocol === 'file:';
      const isBuiltEntry = /\/dist\/index\.html$/i.test(normalizedPath);

      if (isFileEntry && !isBuiltEntry) {
        location.replace(new URL('./dist/index.html', location.href).href);
      } else {
        import('/src/main.tsx');
      }
    </script>
  </body>
</html>
